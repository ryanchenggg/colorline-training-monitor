name: Update Training Status

on:
  schedule:
    # Every 3 hours (UTC)
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Scan checkpoints and generate status files
        run: |
          source /storage/SSD2/miniconda3/etc/profile.d/conda.sh
          conda activate colorline2
          python scripts/update_training_status.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add training_status.md training_status.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update training status"
            git push
          fi
