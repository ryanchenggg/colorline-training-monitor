name: Update Training Status

on:
  schedule:
    # Every 3 hours (UTC)
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: self-hosted
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Scan checkpoints and generate status files
        run: |
          source /storage/SSD2/miniconda3/etc/profile.d/conda.sh
          conda activate colorline2
          python scripts/update_training_status.py

      - name: Commit and push if changed
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add training_status.md training_status.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update training status"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run anomaly detection
        if: steps.push.outputs.changed == 'true'
        run: |
          python scripts/monitor_training.py

      - name: Upload monitor report
        if: steps.push.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: monitor-report
          path: monitor_report.md
          retention-days: 30
